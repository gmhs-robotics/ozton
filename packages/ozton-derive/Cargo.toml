[package]
name = "ozton-derive"
description = "Proc macros for ozton recording ergonomics."
repository = "https://github.com/gmhs-robotics/ozton/"
authors = ["elijah629"]
license = "MIT"
version = "0.3.0"
edition = "2024"

[lib]
proc-macro = true

[dependencies]
proc-macro-crate = "3.4.0"
proc-macro2 = "1.0.101"
quote = "1.0.41"
syn = { version = "2.0.106", features = ["full"] }
