[package]
name = "ozton-motion"
description = "Motion control algorithms in ozton."
repository = "https://github.com/gmhs-robotics/ozton/"
authors = ["elijah629"]
license = "MIT"
categories = ["science::robotics", "no-std", "mathematics", "embedded"]
keywords = ["vex", "vexide", "vex-robotics", "robotics", "autonomous"]
version = "0.2.0"
edition = "2024"

[dependencies]
glam = { workspace = true }
vexide = { workspace = true }
vexide-devices = { workspace = true }
ozton-control = { workspace = true }
ozton-drivetrain = { workspace = true }
ozton-math = { workspace = true }
ozton-tracking = { workspace = true }

[dev-dependencies]
vex-sdk-mock = "0.1.0"

[package.metadata.docs.rs]
targets = ["armv7a-vex-v5"]
cargo-args = [
    "-Zbuild-std=std,panic_abort",
    "-Zbuild-std-features=compiler-builtins-mem",
]
